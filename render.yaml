services:
  - type: web
    name: fadetap-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fadetap-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9

databases:
  - name: fadetap-db
    plan: basic-256mb
    databaseName: fadetap
    user: fadetap
